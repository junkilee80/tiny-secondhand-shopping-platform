{% extends 'base.html' %}

{% block content %}
<h2>전체 채팅</h2>

<div class="card mb-4">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn btn-primary">전송</button>
        </form>
    </div>
</div>

<h4>메시지 목록</h4>

{% for message in messages %}
    <div class="card mb-2">
        <div class="card-body">
            <p class="mb-1">
                <strong>{{ message.sender.username }}</strong>
                <small class="text-muted">{{ message.created_at }}</small>
            </p>

            <p class="mb-0">{{ message.content|linebreaksbr }}</p>
        </div>
    </div>
{% empty %}
    <p>아직 메시지가 없습니다.</p>
{% endfor %}
{% endblock %}
