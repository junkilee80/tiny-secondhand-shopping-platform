<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>Tiny Second-hand Shopping Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Tiny Market</a>

        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="{% url 'products:list' %}">Products</a>
            <a class="nav-link" href="#">Chat</a>

            {% if user.is_authenticated %}
                <a class="nav-link" href="{% url 'accounts:profile' %}">My Page</a>

                <form method="post" action="{% url 'accounts:logout' %}" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-link nav-link" style="display:inline; padding: 8px;">
                        Logout
                    </button>
                </form>
            {% else %}
                <a class="nav-link" href="{% url 'accounts:login' %}">Login</a>
                <a class="nav-link" href="{% url 'accounts:signup' %}">Signup</a>
            {% endif %}
        </div>
    </div>
</nav>

<main class="container mt-4">
    {% block content %}
    {% endblock %}
</main>

</body>
</html>
