{% extends 'base.html' %}

{% block content %}
<h2>상품 삭제</h2>

<div class="alert alert-danger">
    정말로 <strong>{{ product.title }}</strong> 상품을 삭제하시겠습니까?
</div>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">삭제</button>
    <a href="{% url 'products:detail' product.id %}" class="btn btn-secondary">취소</a>
</form>
{% endblock %}
